# status bar
#set-option -g status-utf8 on
#set -g utf8 on

set-option -g default-shell /bin/bash

set -g status-interval 1
set -g status-position bottom
set -g status-justify left # center align window list
set -g status-left-length 30
set -g status-right-length 100
set -g status-left ' '
#set -g status-left '#[fg=yellow][#[fg=green]#H #[fg=black]• #[fg=green,bright]#(whoami)#[default]#[fg=yellow]]: '
#set -g status-right '#[fg=green]#(tmux-mem-cpu-load 1) #[]#(uptime | cut -f 4-5 -d " " | cut -f 1 -d ",") %a%l:%M:%S %p %Y-%m-%d'
set -g status-right '#{?GITMUX_REPO,#[fg=white]#[bg=brightblack] #[fg=red]❓#{GITMUX_UNTRACKED} #[fg=yellow]▲ #{GITMUX_CHANGED} #[fg=green]● #{GITMUX_STAGED} #[fg=white] #[fg=green]↑#{GITMUX_COMMITS_AHEAD} #[fg=red]↓#{GITMUX_COMMITS_BEHIND} #[fg=white] #{?GITMUX_REMOTE,#{GITMUX_BRANCH},#[fg=white]#{GITMUX_BRANCH} #[fg=white] #{GITMUX_REPO_NAME}},}'

# default statusbar colors
set -g status-fg white
set -g status-bg default

# Replaces: set -g status-style bright
set -g status-style "fg=default,bg=default,bold"

# default window title colors
set -g window-status-style "fg=white,bg=default,dim"

# active window title colors
set -g window-status-current-style "fg=black,bg=green,bold"

# C-b is not acceptable -- Vim uses it
unbind C-b
set-option -g prefix C-a

# Iterate panes using alt-left/right
bind -n M-Left select-pane -t :.+
bind -n M-Right select-pane -t :.-
# unbind -n M-Left
# unbind -n M-Right

# Iterate panes using alt-k/j
bind -n M-k select-pane -t :.+
bind -n M-j select-pane -t :.-

# Iterate windows using alt-h/l
bind -n M-l next-window
bind -n M-h previous-window

# Resize using alt-z
bind -n M-z resize-pane -Z

# Send cursor to start using ctrl-q
bind -n C-q send-keys C-a

# Wipe terminal using ctrl-l
bind-key -n C-l send-keys C-l \; send-keys -R \; clear-history

# For those keyboards where there is no page-up/down
bind -T copy-mode-vi S-Up send-keys -X page-up
bind -T copy-mode-vi S-Down send-keys -X page-down

# Start numbering at 1
set -g base-index 1

# Allows for faster key repetition
set -s escape-time 0

# Rather than constraining window size to the maximum size of any client 
# connected to the *session*, constrain window size to the maximum size of any 
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# Allows us to use C-a a <command> to send commands to a TMUX session inside 
# another TMUX session
bind-key a send-prefix

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Highlight active window
#set-window-option -g window-status-current-bg green
#set-window-option -g window-status-current-style fg=white,bg=green,bright

set -g pane-border-style "bg=default fg=gray"
set -g pane-active-border-style "bg=default fg=yellow"

# Vi copypaste mode
set-window-option -g mode-keys vi
#bind-key -t vi-copy 'v' begin-selection
#bind-key -t vi-copy 'y' copy-selection

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# auto window rename
#set-window-option -g automatic-rename
set-window-option -g automatic-rename off
set-option -g allow-rename off
# rm mouse mode fail
# set -g mode-mouse off

# color
set -g default-terminal "screen-256color"

# Sane scrolling
# TODO: make sure this works in OSX
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

set-option -g history-limit 10000

